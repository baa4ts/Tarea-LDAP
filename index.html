<!DOCTYPE html>
<html lang="es-UY">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        *,
        ::after,
        ::before {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            font-family: "JetBrains Mono", monospace;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            border-radius: 6px;
            overflow: hidden;
        }

        .header {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .result-box {
            padding: 20px;
            background-color: white;
        }

        .item {
            margin-bottom: 15px;
        }

        .label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .code-row {
            display: flex;
            background: #f4f4f4;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.5;
        }

        .copy-btn:hover {
            opacity: 1;
        }

        .dropzone {
            height: 250px;
            background: #6b21a8;
            border: 2px dashed white;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
        }

        .dropzone input {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2 class="title">LDAP USER</h2>
        </div>
        <div class="result-box" id="output">
            <p style="color: #ccc; font-size: 12px;">Esperando archivo...</p>
        </div>
        <label class="dropzone">
            <input type="file">
            <span class="text">suelta aqui tu archivo .env</span>
        </label>
    </div>

    <script>
        const input = document.querySelector('input[type="file"]');
        const output = document.getElementById('output');

        const copyToClipboard = (text) => {
            navigator.clipboard.writeText(text);
        };

        input.addEventListener('change', (e) => {
            const archivo = e.target.files[0];
            if (!archivo) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const contenido = event.target.result;
                const lineas = contenido.split(/\r?\n/);
                let usuario = { username: null, password: null };

                lineas.forEach(linea => {
                    const c = linea.split("=");
                    if (c[0]?.trim() === "LDAP_ADMIN_PASSWORD") usuario.password = c[1]?.trim();
                    if (c[0]?.trim() === "LDAP_DOMAIN") usuario.username = c[1]?.trim();
                });

                if (!usuario.password || !usuario.username) {
                    alert("Faltan datos en el .env");
                    return;
                }

                const dcFormat = usuario.username.split('.').map(word => `dc=${word}`).join(',');
                const loginDN = `cn=admin,${dcFormat}`;

                output.innerHTML = `
                    <div class="item">
                        <span class="label">- Login DN:</span>
                        <div class="code-row">
                            <span>${loginDN}</span>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText('${loginDN}')">📋</button>
                        </div>
                    </div>
                    <div class="item">
                        <span class="label">- Password:</span>
                        <div class="code-row">
                            <span>${usuario.password}</span>
                            <button class="copy-btn" onclick="navigator.clipboard.writeText('${usuario.password}')">📋</button>
                        </div>
                    </div>
                `;
            };
            reader.readAsText(archivo);
        });
    </script>
</body>

</html>
